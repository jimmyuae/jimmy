<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" role="img" aria-labelledby="title desc">
  <title id="title">Jimmy logo</title>
  <desc id="desc">Rounded white Jimmy wordmark with blue lettering for the header.</desc>
  <defs>
    <linearGradient id="jimmyBorder" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#9fc0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0c47a5" flood-opacity="0.16"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="6" y="10" width="448" height="100" rx="28" fill="#ffffff" stroke="url(#jimmyBorder)" stroke-width="4"/>
  </g>
  <rect x="20" y="24" width="420" height="72" rx="22" fill="#ffffff" opacity="0.92"/>
  <text x="230" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" letter-spacing="4" fill="#0b3f94">JIMMY</text>
  <path d="M52 88c22 10 46 15 72 15h214" fill="none" stroke="#54a6ff" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
</svg>
