<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jimmy Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="theme-color" content="#0c47a5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Jimmy">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/assets/jimmy-logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="mask-icon" href="/assets/jimmy-logo-mask.svg" color="#0c47a5">
  <meta name="msapplication-TileColor" content="#0c47a5">
  <meta name="msapplication-config" content="/browserconfig.xml">
</head>
<body class="login-body">
  <div id="appSplash" class="app-splash" aria-hidden="true">
    <div class="app-splash-card">
      <img class="app-splash-logo" src="/assets/jimmy-logo.svg" alt="Jimmy">
      <p class="app-splash-subtitle">Attendance and store sales system</p>
      <div class="app-splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <main class="login-page-wrap">
    <section class="login-card" aria-label="Jimmy login">
      <img class="login-brand-img" src="/assets/jimmy-logo.svg" alt="Jimmy logo">

      <div class="login-heading-block">
        <h1>Welcome Back</h1>
        <p>Please sign in to continue.</p>
      </div>

      <div id="loginError" class="error login-error"></div>

      <form id="loginForm" class="mobile-login-form">
        <div class="login-field-group">
          <label for="identifier">Staff/Admin ID</label>
          <div class="input-icon-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <input id="identifier" name="identifier" type="text" autocomplete="username" placeholder="Enter your staff or admin ID" required>
          </div>
        </div>

        <div class="login-field-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 14v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
            <button class="password-toggle" id="togglePassword" type="button" aria-label="Show or hide password">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.6 10.7a2 2 0 0 0 2.7 2.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M7.5 7.8C5.6 8.9 4.1 10.5 3 12c2.1 3 5.1 5 9 5 1.3 0 2.5-.2 3.6-.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.2 5.2c.6-.1 1.2-.2 1.8-.2 3.9 0 6.9 2 9 5-.6.9-1.4 1.8-2.3 2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="login-submit" type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="/js/common.js"></script>
  <script>
    const passwordField = document.getElementById('password');
    document.getElementById('togglePassword').addEventListener('click', () => {
      passwordField.type = passwordField.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const error = document.getElementById('loginError');
      error.style.display = 'none';
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ identifier: document.getElementById('identifier').value, password: passwordField.value })
        }, false);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        location.href = data.user.role === 'worker' ? '/worker.html' : '/admin.html';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
